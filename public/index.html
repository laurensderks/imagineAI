<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>ImagineAI — Draw. Style. Render.</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">

  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn only-mobile" id="toggleLeftPanel" aria-label="Toggle tools">
      <svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <div class="brand">
      <span class="brand-mark"></span>
      <span class="brand-name">ImagineAI</span>
    </div>

    <div class="topbar-actions">
      <button class="icon-btn" id="undoBtn" title="Undo last stroke" aria-label="Undo">
        <svg viewBox="0 0 24 24"><path d="M9 14l-4-4 4-4"/><path d="M5 10h9a5 5 0 0 1 0 10h-2"/></svg>
      </button>
      <button class="icon-btn" id="clearBtn" title="Clear canvas" aria-label="Clear canvas">
        <svg viewBox="0 0 24 24"><path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/></svg>
      </button>
      <button class="icon-btn only-mobile" id="toggleRightPanel" aria-label="Toggle render styles">
        <svg viewBox="0 0 24 24"><path d="M12 2l2.4 6.6L21 10l-6.6 1.4L12 18l-1.4-6.6L4 10l6.6-1.4z"/></svg>
      </button>
    </div>
  </header>

  <div class="workspace">

    <!-- Left tool panel -->
    <aside class="panel panel-left" id="leftPanel">
      <div class="panel-scroll">

        <section class="panel-section">
          <h3>Brush</h3>
          <div class="brush-grid" id="brushGrid"><!-- populated by app.js --></div>
        </section>

        <section class="panel-section">
          <div class="row-between">
            <h3>Size</h3>
            <span class="value-pill" id="sizeValue">14</span>
          </div>
          <input type="range" id="sizeSlider" min="1" max="80" value="14" />
        </section>

        <section class="panel-section">
          <div class="row-between">
            <h3>Colour</h3>
            <button class="eraser-toggle" id="eraserBtn" title="Eraser">
              <svg viewBox="0 0 24 24"><path d="M16 3l5 5-9.5 9.5H6l-3-3z"/><path d="M5.5 13.5L11 19h9"/></svg>
              <span>Eraser</span>
            </button>
          </div>
          <div class="swatch-grid" id="colorSwatches"><!-- populated by app.js --></div>
          <label class="custom-color-row">
            <span>Custom</span>
            <input type="color" id="customColor" value="#7c5cff" />
          </label>
        </section>

        <section class="panel-section">
          <h3>Canvas background</h3>
          <div class="swatch-grid" id="bgSwatches"><!-- populated by app.js --></div>
          <label class="custom-color-row">
            <span>Custom</span>
            <input type="color" id="customBg" value="#ffffff" />
          </label>
        </section>

      </div>
    </aside>

    <!-- Canvas stage -->
    <main class="stage" id="stage">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="drawCanvas"></canvas>
      </div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomOutBtn" aria-label="Zoom out">&minus;</button>
        <span class="zoom-level" id="zoomLevel">100%</span>
        <button class="zoom-btn" id="zoomInBtn" aria-label="Zoom in">+</button>
      </div>
    </main>

    <!-- Right style / render panel -->
    <aside class="panel panel-right" id="rightPanel">
      <div class="panel-scroll">
        <section class="panel-section">
          <h3>Render style</h3>
          <p class="hint">Pick one look, then render your drawing with AI.</p>
          <div class="style-grid" id="styleGrid"><!-- populated by app.js --></div>
          <div class="style-detail" id="styleDetail" hidden><!-- populated by app.js --></div>
        </section>

        <section class="panel-section">
          <div class="row-between">
            <h3>Instructions</h3>
            <span class="value-pill">Optional</span>
          </div>
          <textarea
            id="extraInstructions"
            class="instructions-input"
            rows="3"
            maxlength="500"
            placeholder="Add extra detail for the AI, e.g. “make the sky sunset orange” or “add a cat sitting by the door”…"
          ></textarea>
        </section>

        <button class="render-btn" id="renderBtn">
          <svg viewBox="0 0 24 24"><path d="M12 2l2.4 6.6L21 10l-6.6 1.4L12 18l-1.4-6.6L4 10l6.6-1.4z"/></svg>
          <span>Render</span>
        </button>
      </div>
    </aside>

    <!-- Panel scrims for mobile slide-in -->
    <div class="scrim" id="scrim"></div>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-header">
      <h2>Rendered artwork</h2>
      <button class="icon-btn" id="closeResult" aria-label="Close">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div class="result-body">
      <div class="result-pane">
        <span class="pane-label">Original</span>
        <img id="originalPreview" alt="Original drawing" />
      </div>
      <div class="result-pane">
        <span class="pane-label">Rendered</span>
        <div class="result-render-slot" id="renderSlot">
          <div class="loading-state" id="loadingState">
            <div class="spinner"></div>
            <p>Rendering your masterpiece…</p>
          </div>
          <img id="renderedPreview" alt="Rendered artwork" hidden />
          <div class="error-state" id="errorState" hidden>
            <p id="errorMessage"></p>
          </div>
        </div>
      </div>
    </div>

    <div class="result-actions">
      <button class="btn btn-ghost" id="editAgainBtn">Back to editing</button>
      <button class="btn btn-primary" id="downloadBtn" disabled>Download image</button>
    </div>
  </div>
</div>

<script src="js/brushes.js"></script>
<script src="js/canvas.js"></script>
<script src="js/zoom.js"></script>
<script src="js/app.js"></script>
</body>
</html>
